<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Snake Game</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
    font-family:Arial,sans-serif;
    flex-direction:column;
    color:white;
}

h1{
    margin-bottom:10px;
}

#score{
    font-size:24px;
    margin-bottom:10px;
}

canvas{
    border:4px solid #fff;
    background:#222;
    box-shadow:0 0 20px #00ff88;
}
</style>
</head>
<body>

<h1>🐍 3D Snake Game</h1>
<div id="score">Score: 0</div>

<canvas id="game" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 30;
const rows = canvas.width / box;

let snake = [
    {x: 10, y: 10}
];

let direction = "RIGHT";

let food = {
    x: Math.floor(Math.random() * rows),
    y: Math.floor(Math.random() * rows)
};

let score = 0;

document.addEventListener("keydown", changeDirection);

function changeDirection(event){
    const key = event.key;

    if(key === "ArrowUp" && direction !== "DOWN")
        direction = "UP";

    if(key === "ArrowDown" && direction !== "UP")
        direction = "DOWN";

    if(key === "ArrowLeft" && direction !== "RIGHT")
        direction = "LEFT";

    if(key === "ArrowRight" && direction !== "LEFT")
        direction = "RIGHT";
}

function drawCube(x, y, color){
    let px = x * box;
    let py = y * box;

    // Main face
    ctx.fillStyle = color;
    ctx.fillRect(px, py, box, box);

    // Highlight
    ctx.fillStyle = "rgba(255,255,255,0.4)";
    ctx.fillRect(px, py, box, 5);
    ctx.fillRect(px, py, 5, box);

    // Shadow
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.fillRect(px + box - 5, py, 5, box);
    ctx.fillRect(px, py + box - 5, box, 5);
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Food
    drawCube(food.x, food.y, "#ff4444");

    // Snake
    for(let i=0;i<snake.length;i++){
        drawCube(
            snake[i].x,
            snake[i].y,
            i===0 ? "#00ff88" : "#00cc66"
        );
    }

    let headX = snake[0].x;
    let headY = snake[0].y;

    if(direction === "UP") headY--;
    if(direction === "DOWN") headY++;
    if(direction === "LEFT") headX--;
    if(direction === "RIGHT") headX++;

    // Eat food
    if(headX === food.x && headY === food.y){
        score++;
        document.getElementById("score").innerText =
            "Score: " + score;

        food = {
            x: Math.floor(Math.random() * rows),
            y: Math.floor(Math.random() * rows)
        };
    } else {
        snake.pop();
    }

    const newHead = {
        x: headX,
        y: headY
    };

    // Wall collision
    if(
        headX < 0 ||
        headY < 0 ||
        headX >= rows ||
        headY >= rows ||
        collision(newHead, snake)
    ){
        clearInterval(game);
        alert("Game Over! Score: " + score);
    }

    snake.unshift(newHead);
}

function collision(head, body){
    for(let i=0;i<body.length;i++){
        if(head.x === body[i].x &&
           head.y === body[i].y){
            return true;
        }
    }
    return false;
}

const game = setInterval(draw, 120);
</script>

</body>
</html>
